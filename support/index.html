<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../icon.png" />
    <title>Wayd - Support</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap");

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #000;
        color: #fff;
        font-family: "Poppins", sans-serif;
      }
      .container {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        min-height: 100vh;
        padding: 40px;
        box-sizing: border-box;
        position: relative;
        z-index: 1;
      }
      .content-wrapper {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        flex-grow: 1;
      }
      .header {
        text-align: center;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 1.8rem;
        font-weight: 300;
        margin: 0;
        color: #fff;
        letter-spacing: 2px;
      }
      .support-content {
        text-align: center;
        max-width: 500px;
      }
      p {
        font-size: 1rem;
        font-weight: 300;
        line-height: 1.6;
        opacity: 0.7;
        margin-bottom: 30px;
      }
      .contact-button {
        display: inline-block;
        color: #fff;
        text-decoration: none;
        padding: 10px 24px;
        border-radius: 20px;
        font-size: 0.9rem;
        font-weight: 400;
        background-color: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: all 0.3s ease;
        letter-spacing: 0.5px;
      }
      .contact-button:hover {
        background-color: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.4);
        transform: translateY(-2px);
        box-shadow: 0 2px 10px rgba(255, 255, 255, 0.05);
      }
      .footer {
        text-align: center;
        font-size: 0.7rem;
        opacity: 0.3;
        letter-spacing: 0.5px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <script src="../cosmic-glow.js"></script>
    <script src="../starfield.js"></script>
    <div class="container">
      <div class="content-wrapper">
        <div class="header">
          <h1>Support</h1>
        </div>
        <div class="support-content">
          <p>
            Need help or have a question? We're here to assist you.
          </p>
          <a
            href="mailto:assistant@wayd.social?subject=wayd%20Support%20Request"
            class="contact-button"
            >Contact Us</a
          >
        </div>
      </div>
      <div class="footer">
        <p>© <span id="currentYear"></span> wayd · All rights reserved</p>
      </div>
    </div>
    <script>
      document.getElementById("currentYear").textContent =
        new Date().getFullYear();
    </script>
  </body>
</html>
